<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TriPilot — Aerial Media & Documentation</title>
  
  <link rel="icon" type="image/png" href="favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0D0D0D;
      --white: #FAFAF8;
      --gray-100: #F4F3F0;
      --gray-200: #E5E4E0;
      --gray-400: #9B9A96;
      --gray-600: #5A5955;
      --accent: #1A3A2A;
      --accent-light: #2D6A47;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    
    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 4rem;
      background: rgba(250, 250, 248, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
    }
    .nav-logo { font-family: var(--serif); font-size: 1.3rem; color: var(--black); text-decoration: none; letter-spacing: -0.01em; }
    .nav-logo span { color: var(--accent-light); font-style: italic; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.875rem; font-weight: 400; color: var(--gray-600); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--black); }
    .nav-cta { font-size: 0.875rem; font-weight: 500; color: var(--white); background: var(--accent); text-decoration: none; padding: 0.6rem 1.4rem; border-radius: 2rem; transition: background 0.2s; }
    .nav-cta:hover { background: var(--accent-light); }

    /* HERO */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 4rem 6rem;
      position: relative;
      overflow: hidden;
      background: var(--black);
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(13,13,13,0.3) 0%, rgba(13,13,13,0.7) 70%, rgba(13,13,13,0.95) 100%), url('https://images.unsplash.com/photo-1473968512647-3e447244af8f?w=1600&q=80') center/cover no-repeat;
    }
    .hero-eyebrow {
      position: relative;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent-light);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .hero-eyebrow::before { content: ''; display: block; width: 2rem; height: 1px; background: var(--accent-light); }
    .hero-headline {
      position: relative;
      font-family: var(--serif);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--white);
      max-width: 50rem;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }
    .hero-headline em { font-family: var(--serif); font-style: italic; font-weight: 400; color: var(--gray-400); }
    .hero-sub { position: relative; font-size: clamp(1.1rem, 2vw, 1.35rem); color: var(--gray-200); max-width: 38rem; margin-bottom: 3rem; font-weight: 300; }
    .hero-actions { position: relative; display: flex; gap: 1.25rem; align-items: center; z-index: 2; }
    
    .btn-primary { font-size: 0.9rem; font-weight: 500; color: var(--white); background: var(--accent-light); text-decoration: none; padding: 1rem 2rem; border-radius: 2rem; transition: background 0.2s; }
    .btn-primary:hover { background: #388E3C; }
    .btn-ghost { font-size: 0.9rem; font-weight: 500; color: var(--white); text-decoration: none; padding: 1rem 2rem; border-radius: 2rem; border: 1px solid rgba(255,255,255,0.3); transition: background 0.2s, border 0.2s; }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); border-color: var(--white); }
    
    .hero-scroll { position: absolute; bottom: 2rem; right: 4rem; display: flex; align-items: center; gap: 1rem; color: var(--gray-400); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
    .scroll-line { width: 40px; height: 1px; background: var(--gray-600); position: relative; overflow: hidden; }
