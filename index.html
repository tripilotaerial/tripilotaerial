<html lang="en">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0D0D0D;
      --white: #FAFAF8;
      --gray-100: #F4F3F0;
      --gray-200: #E5E4E0;
      --gray-400: #9B9A96;
      --gray-600: #5A5955;
      --accent: #1A3A2A;
      --accent-light: #2D6A47;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    
    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 4rem;
      background: rgba(250, 250, 248, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
    }
    .nav-logo { font-family: var(--serif); font-size: 1.3rem; color: var(--black); text-decoration: none; letter-spacing: -0.01em; }
    .nav-logo span { color: var(--accent-light); font-style: italic; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.875rem; font-weight: 400; color: var(--gray-600); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--black); }
    .nav-cta { font-size: 0.875rem; font-weight: 500; color: var(--white); background: var(--accent); text-decoration: none; padding: 0.6rem 1.4rem; border-radius: 2rem; transition: background 0.2s; }
    .nav-cta:hover { background: var(--accent-light); }

      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 4rem 6rem;
      position: relative;
      overflow: hidden;
      background: var(--black);
    }
